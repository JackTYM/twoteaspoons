# Cloudflare Pages configuration for TwoTeaspoons
# Deploy with: npx wrangler pages deploy dist

name = "twoteaspoons"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding for image uploads
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "twoteaspoons-images"

# Public environment variables (non-secrets)
[vars]
NUXT_PUBLIC_NEON_AUTH_URL = "https://ep-lucky-haze-akey0v5e.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth"
NUXT_PUBLIC_NEON_DATA_API_URL = "https://ep-lucky-haze-akey0v5e.apirest.c-3.us-west-2.aws.neon.tech/neondb/rest/v1"
R2_PUBLIC_URL = "https://b02f8af4ff36e6fa9e028952a9f38043.r2.cloudflarestorage.com"

# Secrets to set in Cloudflare Pages dashboard:
#
# DATABASE_URL          - Neon Postgres connection string (for server endpoints)
