# Cloudflare Pages configuration for TwoTeaspoons
# Deploy with: npx wrangler pages deploy dist

name = "twoteaspoons"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding for image uploads
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "twoteaspoons-images"

# Environment variables to set in Cloudflare Pages dashboard:
#
# DATABASE_URL          - Neon Postgres connection string (for server endpoints)
# NEON_AUTH_URL         - Neon Auth endpoint URL
# NEON_DATA_API_URL     - Neon Data API endpoint URL
# NUXT_PUBLIC_NEON_AUTH_URL     - Public Neon Auth URL (client-side)
# NUXT_PUBLIC_NEON_DATA_API_URL - Public Neon Data API URL (client-side)
# R2_ACCOUNT_ID         - Cloudflare account ID
# R2_ACCESS_KEY_ID      - R2 API access key
# R2_SECRET_ACCESS_KEY  - R2 API secret key
# R2_BUCKET_NAME        - R2 bucket name (twoteaspoons-images)
# R2_PUBLIC_URL         - R2 public URL for serving images
